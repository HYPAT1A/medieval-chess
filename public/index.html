<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medieval Chess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Main Menu -->
    <div id="menu" class="screen">
      <h1>Medieval Chess</h1>
      <div class="menu-buttons">
        <button id="btn-ai" class="menu-btn">Play vs AI</button>
        <button id="btn-multiplayer" class="menu-btn">Play vs Friend</button>
      </div>
    </div>

    <!-- AI Difficulty Selection -->
    <div id="difficulty" class="screen hidden">
      <h2>Select Difficulty</h2>
      <div class="menu-buttons">
        <button class="menu-btn difficulty-btn" data-difficulty="easy">Easy</button>
        <button class="menu-btn difficulty-btn" data-difficulty="medium">Medium</button>
        <button class="menu-btn difficulty-btn" data-difficulty="hard">Hard</button>
      </div>
      <button class="back-btn" data-target="menu">Back</button>
    </div>

    <!-- Multiplayer Menu -->
    <div id="multiplayer-menu" class="screen hidden">
      <h2>Multiplayer</h2>
      <div class="multiplayer-options">
        <div class="option-group">
          <button id="btn-create-game" class="menu-btn">Create Game</button>
        </div>
        <div class="option-group">
          <input type="text" id="join-code" placeholder="Enter Game Code" maxlength="6">
          <button id="btn-join-game" class="menu-btn">Join Game</button>
        </div>
      </div>
      <button class="back-btn" data-target="menu">Back</button>
    </div>

    <!-- Waiting for Opponent -->
    <div id="waiting" class="screen hidden">
      <h2>Waiting for opponent...</h2>
      <div class="game-code-display">
        <span>Game Code:</span>
        <strong id="waiting-code">------</strong>
      </div>
      <p>Share this code with your friend</p>
      <button class="back-btn" data-target="multiplayer-menu">Cancel</button>
    </div>

    <!-- Game Screen -->
    <div id="game" class="screen hidden">
      <div class="game-header">
        <div class="game-info">
          <span id="game-mode">Mode: --</span>
          <span id="turn-indicator">Turn: White</span>
        </div>
        <div class="game-controls">
          <button id="btn-new-game" class="small-btn">New Game</button>
          <button id="btn-quit" class="small-btn">Quit</button>
        </div>
      </div>
      
      <div class="game-container">
        <div class="captured-area" id="captured-black"></div>
        <div class="board-wrapper">
          <div id="board" class="board"></div>
        </div>
        <div class="captured-area" id="captured-white"></div>
      </div>

      <div id="game-status" class="game-status"></div>
      
      <div class="game-footer">
        <button id="btn-share" class="small-btn hidden">Share Code</button>
      </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over" class="modal hidden">
      <div class="modal-content">
        <h2 id="game-over-title">Game Over</h2>
        <p id="game-over-message"></p>
        <div class="modal-buttons">
          <button id="btn-rematch" class="menu-btn">Play Again</button>
          <button id="btn-menu" class="menu-btn">Main Menu</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
